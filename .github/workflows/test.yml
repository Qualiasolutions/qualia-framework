name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # No `cache: 'npm'` — this framework has zero runtime deps and no
          # package-lock.json. setup-node's cache option requires a lockfile
          # and hard-fails without one. Prior to this fix every CI run across
          # 18 matrix cells reported FAILURE before tests even ran, and PRs
          # were being merged on red CI because the root cause was a setup
          # step, not a test failure. Zero deps = nothing to cache.

      - name: Run tests
        shell: bash
        run: npm test
